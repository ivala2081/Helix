name: Forward Test Cron

# Triggers the /api/cron/tick endpoint on Vercel every hour at :02.
# (:02 instead of :00 to ensure Binance has fully closed the 1h candle.)
#
# Required GitHub secrets:
#   VERCEL_URL    — base URL of the production deployment (e.g. https://helix.vercel.app)
#   CRON_SECRET   — same value as the Vercel CRON_SECRET env var

on:
  schedule:
    - cron: "2 * * * *"
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/tick
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Debug: show secret presence + length (never the value itself)
          echo "VERCEL_URL length: ${#VERCEL_URL}"
          echo "CRON_SECRET length: ${#CRON_SECRET}"
          echo "VERCEL_URL first 12 chars: ${VERCEL_URL:0:12}"

          if [ -z "$VERCEL_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing VERCEL_URL or CRON_SECRET secret"
            exit 1
          fi

          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$VERCEL_URL/api/cron/tick")

          http_status=$(echo "$response" | grep HTTP_STATUS | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_STATUS/d')

          echo "HTTP Status: $http_status"
          echo "Response body:"
          echo "$body"

          if [ "$http_status" != "200" ]; then
            echo "::error::Cron tick failed with status $http_status"
            exit 1
          fi
